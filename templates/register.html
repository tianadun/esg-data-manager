{% extends "layout.html" %}
{% block main %}

<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h2 class="mb-3 text-center">Register</h2>
                <p class="text-muted text-center mb-4">
                    Create an account for your sustainability data workspace
                </p>

                <form action="/register" method="post">
                    <div class="mb-3">
                        <label class="form-label" for="username">Username</label>
                        <input autocomplete="off" autofocus class="form-control" id="username" name="username" required type="text">
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="company_name">Company name</label>
                        <input autocomplete="off" class="form-control" id="company_name" name="company_name" placeholder="Nordic Process Materials AB" required type="text">
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="password">Password</label>
                        <input class="form-control" id="password" name="password" required type="password">
                    </div>

                    <div class="mb-4">
                        <label class="form-label" for="confirmation">Confirm password</label>
                        <input class="form-control" id="confirmation" name="confirmation" required type="password">
                    </div>

                    <button class="btn btn-primary w-100" type="submit">Register</button>
                </form>

                <p class="text-center mt-3 mb-0">
                    Already registered? <a href="/login">Log in</a>
                </p>
            </div>
        </div>
    </div>
</div>

{% endblock %}
